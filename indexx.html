        function Button1() {
            var num = parseInt(document.getElementById("txt").value);
            num++;
            document.getElementById("txt").value = num;
        }

        function Button2() {
            var num = parseInt(document.getElementById("txt").value);
            num < 1 ? num = 1 : '';
            num--;
            document.getElementById("txt").value = num;
        }
    </script>
    <div>
        <button onclick="Button1()"> + </button>
        <input type="number" value="1" id="txt">
        <button onclick="Button2()"> - </button>
    </div>
